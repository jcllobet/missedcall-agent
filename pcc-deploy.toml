agent_name = "your-agent-name"
secret_set = "your-secret-set"
websocket_auth = "token"
agent_profile = "agent-1x"
region = "us-west"

[scaling]
min_agents = 1
max_agents = 5

[krisp_viva]
audio_filter = "tel"

[build]
context_dir = "."
dockerfile = "Dockerfile"

[build.exclude]
patterns = [
  "archive/",
  "data/",
  "tests/",
  "*.md",
  ".env",
  ".env.*",
]
